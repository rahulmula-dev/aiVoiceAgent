version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cila-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cila-network

  redis:
    image: redis:7-alpine
    container_name: cila-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cila-network

  cila-ai-agent:
    build: .
    image: cila-ai-agent:latest
    container_name: cila-ai-agent
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=${APP_ENV:-production}
      - PORT=8000
      - REDIS_URL=redis://redis:6379
      - FASTTEXT_MODEL_PATH=/app/models/lid.176.ftz
    env_file:
      - .env
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/readyz"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.2'
          memory: 256M
    networks:
      - cila-network

networks:
  cila-network:
    driver: bridge

volumes:
  pgdata:
