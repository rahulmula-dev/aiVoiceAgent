version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: cila-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cila-network

  cila-ai-agent:
    build: .
    image: cila-ai-agent:latest
    container_name: cila-ai-agent
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - PORT=8000
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/readyz"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.2'
          memory: 256M
    networks:
      - cila-network

networks:
  cila-network:
    driver: bridge
